<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be a member</title>
    <link rel="stylesheet" href="be_a_member.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="outerbody">
        <a id="back" href="index.html"><i class="fa-solid fa-house"></i>back to home </a>
        <div class="details">
            
            <form onsubmit="return authenticate()">
                
                <h1>Enter your information</h1> 
                <input class="uname" required type="text" placeholder="First name">
                <input class="uname" required type="text" placeholder="Last name"><br>
                <input class="ibox" id="dob" required type="date" placeholder="D-O-B"><br>
                <input class="radio" name="gender"  type="radio">Male
                <input class="radio" name="gender"  type="radio">Female <br>
                <input class="ibox" required type="text" placeholder="Father's name"><br>
                <input class="ibox" id="email" required type="email" placeholder="Email"><br>
                <input class="ibox" required minlength="10" type="number" placeholder="Phone no."><br>
                <input class="ibox" required minlength="10" type="number" placeholder="Aadhar no."><br>
                <input class="ibox" required type="text" placeholder="Driving license"><br>
                <input class="ibox" required type="text" placeholder="Permanent address"><br>
                <input class="ibox" required type="text" placeholder="Pressent address"><br>
                <input class="ibox" required minlength="5" type="password" placeholder="Password"><br>
                <input class="ibox" required minlength="5" type="password" placeholder="Confirm Password"><br>
                <input class="check" type="checkbox">I agree to the <a href="">Terms & Condition</a><br><br><br>
                <button>Submit</button>
            </form>
        </div>
    </div>
        
    <script>
        unameObj=document.getElementsByClassName("uname")
        upassObj=document.getElementById("upass")

        function authenticate(){
            if(unameObj.value=="car123" && upassObj.value=="rental"){
                location.href="index.html";
                return false
            }
            else{
                alert("invalid credentials")
                return false
            }
        }
    </script>

</body>
</html>
